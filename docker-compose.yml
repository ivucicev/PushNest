services:
  web:
    image: ghcr.io/ivucicev/pushnest:latest
    pull_policy: always
    expose:
      - "3000"
    environment:
      DATABASE_URL: file:///app/data/pushnest.db
      NEXT_PUBLIC_APP_URL: https://push.yourcompany.com
    volumes:
      - ./data:/app/data
    restart: unless-stopped
